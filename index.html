<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=no, minimum-scale=1.0, maximum-scale=1.0">
    <title>WebAR Động Vật - AR.js</title>
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
  </head>
  <body style="margin: 0px; overflow: hidden;">
    
    <a-scene embedded vr-mode-ui="enabled: false" arjs="sourceType: webcam; debugUIEnabled: false;">
      
      <!-- Định vị bằng mã vuông Hiro -->
      <a-marker preset="hiro">
        
        <!-- Nhóm toàn bộ các bộ phận con vật vào một thực thể để dễ quản lý -->
        <a-entity position="0 0 0" scale="1 1 1">
          
          <!-- THÂN: Hình cầu màu vàng lớn -->
          <a-sphere position="0 0.5 0" radius="0.5" color="#FFD700"></a-sphere>
          
          <!-- ĐẦU: Hình cầu màu vàng nhỏ hơn nằm phía trên -->
          <a-sphere position="0 1.1 0.1" radius="0.35" color="#FFD700"></a-sphere>
          
          <!-- MẮT TRÁI: Hình cầu nhỏ màu đen -->
          <a-sphere position="-0.12 1.2 0.4" radius="0.04" color="#000000"></a-sphere>
          
          <!-- MẮT PHẢI: Hình cầu nhỏ màu đen -->
          <a-sphere position="0.12 1.2 0.4" radius="0.04" color="#000000"></a-sphere>
          
          <!-- MỎ: Hình nón nằm ngang màu cam dẹt -->
          <a-cone position="0 1.05 0.45" radius-bottom="0.08" radius-top="0" height="0.15" rotation="90 0 0" color="#FF4500"></a-cone>
          
          <!-- CÁNH TRÁI: Hình elip dẹt (dùng quả cầu co giãn góc) -->
          <a-sphere position="-0.52 0.5 0" scale="0.1 0.25 0.3" rotation="0 0 10" color="#FFA500"></a-sphere>
          
          <!-- CÁNH PHẢI: Hình elip dẹt -->
          <a-sphere position="0.52 0.5 0" scale="0.1 0.25 0.3" rotation="0 0 -10" color="#FFA500"></a-sphere>
          
          <!-- CHÂN TRÁI: Hình trụ ngắn màu cam -->
          <a-cylinder position="-0.2 0.05 0" radius="0.05" height="0.1" color="#FF4500"></a-cylinder>
          
          <!-- CHÂN PHẢI: Hình trụ ngắn màu cam -->
          <a-cylinder position="0.2 0.05 0" radius="0.05" height="0.1" color="#FF4500"></a-cylinder>

        </a-entity>

      </a-marker>
      
      <a-entity camera></a-entity>
      
    </a-scene>
  </body>
</html>
