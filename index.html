<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=no, minimum-scale=1.0, maximum-scale=1.0">
    <title>WebAR Cá Nhỏ - AR.js</title>
    <script src="https://aframe.io/releases/1.2.0/aframe.min.js"></script>
    <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
  </head>
  <body style="margin: 0px; overflow: hidden;">
    
    <a-scene embedded vr-mode-ui="enabled: false" arjs="sourceType: webcam; debugUIEnabled: false;">
      
      <!-- Định vị bằng mã vuông Hiro -->
      <a-marker preset="hiro">
        
        <!-- Nhóm toàn bộ bộ phận của chú cá -->
        <a-entity position="0 0.5 0" scale="1 1 1">
          
          <!-- THÂN CÁ: Hình cầu kéo dài theo trục Z (scale Z=1.6) tạo dáng thuôn như quả trứng -->
          <a-sphere position="0 0 0" scale="0.4 0.4 0.7" color="#FF4500"></a-sphere>
          
          <!-- SỌC TRẮNG TRÊN THÂN: Một vòng tròn dẹt bao quanh thân -->
          <a-cylinder position="0 0 0.05" radius="0.41" height="0.1" rotation="90 0 0" color="#FFFFFF"></a-cylinder>
          
          <!-- MẮT TRÁI: Hình cầu nhỏ màu trắng + tròng đen -->
          <a-sphere position="-0.22 0.15 0.4" radius="0.06" color="#FFFFFF"></a-sphere>
          <a-sphere position="-0.24 0.15 0.43" radius="0.03" color="#000000"></a-sphere>
          
          <!-- MẮT PHẢI: Hình cầu nhỏ màu trắng + tròng đen -->
          <a-sphere position="0.22 0.15 0.4" radius="0.06" color="#FFFFFF"></a-sphere>
          <a-sphere position="0.24 0.15 0.43" radius="0.03" color="#000000"></a-sphere>
          
          <!-- VÂY LƯNG: Hình nón dẹt hướng lên trên -->
          <a-cone position="0 0.45 -0.1" radius-bottom="0.15" radius-top="0" height="0.3" scale="0.3 1 1" rotation="-20 0 0" color="#FF4500"></a-cone>
          
          <!-- VÂY BƠI TRÁI: Hình tam giác dẹt chếch ra ngoài -->
          <a-cone position="-0.4 0 0.2" radius-bottom="0.15" radius-top="0" height="0.25" scale="0.2 1 1" rotation="30 0 60" color="#FF8C00"></a-cone>
          
          <!-- VÂY BƠI PHẢI: Hình tam giác dẹt chếch ra ngoài -->
          <a-cone position="0.4 0 0.2" radius-bottom="0.15" radius-top="0" height="0.25" scale="0.2 1 1" rotation="30 0 -60" color="#FF8C00"></a-cone>
          
          <!-- ĐUÔI CÁ: Kết hợp 2 hình nón dẹt đan chéo tạo thành đuôi cá xòe -->
          <a-entity position="0 0 -0.7">
            <!-- Nhánh đuôi trên -->
            <a-cone position="0 0.15 -0.15" radius-bottom="0.18" radius-top="0" height="0.4" scale="0.2 1 1" rotation="-60 0 0" color="#FF4500"></a-cone>
            <!-- Nhánh đuôi dưới -->
            <a-cone position="0 -0.15 -0.15" radius-bottom="0.18" radius-top="0" height="0.4" scale="0.2 1 1" rotation="-120 0 0" color="#FF4500"></a-cone>
          </a-entity>
          
        </a-entity>

      </a-marker>
      
      <a-entity camera></a-entity>
      
    </a-scene>
  </body>
</html>
